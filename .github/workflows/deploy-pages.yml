name: Deploy Static Archive to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Environment Variables
        run: |
          echo "DB_ROOT_PASSWORD=root_pass" >> .env
          echo "DB_DATABASE=autotech" >> .env
          echo "DB_USER=autohitech" >> .env
          echo "DB_PASSWORD=autotech_pass" >> .env
          echo "DB_PORT=3307" >> .env
          echo "WEB_PORT=8000" >> .env
          echo "ADMINER_PORT=8080" >> .env

      - name: Start Docker Containers
        run: |
          docker compose up -d
          # 데이터베이스 초기화 대기
          sleep 30

      - name: Generate Static Site
        run: |
          chmod +x generate_static.sh
          ./generate_static.sh

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./static_site
          cname: autohitech.kr
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: "docs: deploy static archive [skip ci]"
