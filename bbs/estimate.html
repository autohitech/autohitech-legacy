function form_check(sun) {
    if (sun.Company.value == '') {
        alert('회사명을 입력하세요.'); sun.Company.focus(); return false;
    } else if (sun.Tel.value == '') {
        alert('전화번호를 입력하세요.'); sun.Tel.focus(); return false;
    } else if ((sun.email.value=='') || (sun.email.value.search(/(\S+)@(\S+)\.(\S+)/) == -1)) {
        alert('E-mail을 바르게 입력하세요.'); sun.email.focus(); return false;					 
    } else if (sun.Name.value == '') {
        alert('담당자명을 입력하세요.'); sun.Name.focus(); return false;
    }
    return true;
}
