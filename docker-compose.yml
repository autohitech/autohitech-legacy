services:
  db:
    image: mysql:5.7
    platform: linux/amd64
    container_name: autohitech-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:3306"
    volumes:
      - ./database/autotech.sql:/docker-entrypoint-initdb.d/autotech.sql
      - ./database/mysql_data:/var/lib/mysql

  web:
    image: php:5.6-apache
    container_name: autohitech-web
    restart: always
    ports:
      - "${WEB_PORT}:80"
    volumes:
      - .:/var/www/html
    environment:
      - DB_HOST=db
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_DATABASE}
    # .htm 실행 설정 및 include_path 추가
    command: >
      sh -c "sed -i 's/deb.debian.org/archive.debian.org/g' /etc/apt/sources.list &&
             sed -i 's|security.debian.org/debian-security|archive.debian.org/debian-security|g' /etc/apt/sources.list &&
             sed -i '/stretch-updates/d' /etc/apt/sources.list &&
             echo 'DirectoryIndex index.php index.html index.htm' >> /etc/apache2/apache2.conf &&
             echo 'AddDefaultCharset Off' >> /etc/apache2/apache2.conf &&
             echo 'AddType application/x-httpd-php .php .htm .html' >> /etc/apache2/apache2.conf &&
             echo 'php_value include_path \".:/var/www/html\"' >> /etc/apache2/apache2.conf &&
             rm -rf /var/lib/apt/lists/* &&
             apt-get update -o Acquire::Check-Valid-Until=false -o Acquire::CompressionTypes::Order::=gz && 
             apt-get install -y --force-yes libpng-dev libjpeg-dev && 
             docker-php-ext-configure gd --with-jpeg-dir=/usr/include/ &&
             docker-php-ext-install mysql mysqli gd && 
             apache2-foreground"
    depends_on:
      - db

  adminer:
    image: adminer
    container_name: autohitech-adminer
    restart: always
    ports:
      - "${ADMINER_PORT}:8080"
    depends_on:
      - db
