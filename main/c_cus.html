<script type="text/javascript">
  function preloadImages() {
    const images = document.images;
    const numImages = images.length;
    for (let i = 0; i < numImages; i++) {
      if (images[i].getAttribute('data-src')) {
        images[i].src = images[i].getAttribute('data-src');
      }
    }
  }

  function swapImage(event) {
    const image = event.target;
    if (image.getAttribute('data-alt-src')) {
      const temp = image.src;
      image.src = image.getAttribute('data-alt-src');
      image.setAttribute('data-alt-src', temp);
    }
  }

  function attachEvents() {
    const images = document.images;
    const numImages = images.length;
    for (let i = 0; i < numImages; i++) {
      images[i].addEventListener('mouseover', swapImage);
      images[i].addEventListener('mouseout', swapImage);
    }
  }

  // 탭 전환 함수
  function DisplayMenu(index) {
      if (index == 1) {
          document.getElementById('notice1').style.display = '';
          document.getElementById('notice2').style.display = 'none';
      } else {
          document.getElementById('notice1').style.display = 'none';
          document.getElementById('notice2').style.display = '';
      }
  }

  document.addEventListener('DOMContentLoaded', function() {
    preloadImages();
    attachEvents();
  });
</script>
